<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Ledger · Posições Econômicas</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#181818;--border:#1f1f1f;--border2:#2a2a2a;
  --text:#f0f0f0;--muted:#888;--faint:#444;
  --in:#22c55e;--in-bg:rgba(34,197,94,.1);
  --out:#ef4444;--out-bg:rgba(239,68,68,.1);
  --open:#f59e0b;--open-bg:rgba(245,158,11,.1);
  --partial:#fb923c;--partial-bg:rgba(251,146,60,.1);
  --settled:#6366f1;--settled-bg:rgba(99,102,241,.1);
  --reversed:#8b5cf6;--reversed-bg:rgba(139,92,246,.1);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.1);
  --r:6px;--r-sm:4px;--mono:'SF Mono','Fira Code',monospace;--tr:.15s ease;
}
[data-theme=light]{
  --bg:#f4f4f5;--surface:#fff;--surface2:#f0f0f1;--border:#e4e4e7;--border2:#d4d4d8;
  --text:#09090b;--muted:#52525b;--faint:#a1a1aa;
  --in-bg:rgba(34,197,94,.08);--out-bg:rgba(239,68,68,.08);
  --open-bg:rgba(245,158,11,.08);--partial-bg:rgba(251,146,60,.08);
  --settled-bg:rgba(99,102,241,.08);--reversed-bg:rgba(139,92,246,.08);
  --blue-bg:rgba(59,130,246,.08);
}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;font-size:13px;background:var(--bg);color:var(--text);transition:background var(--tr),color var(--tr)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .18s ease both}
.slide-in{animation:slideInRight .22s cubic-bezier(.16,1,.3,1) both}
/* Layout */
.wrap{max-width:1320px;margin:0 auto;padding:0 20px}
/* Header */
.hdr{position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);background:var(--bg);backdrop-filter:blur(12px)}
.hdr-inner{height:52px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;letter-spacing:-.02em}
.brand-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);box-shadow:0 0 6px var(--blue)}
.hdr-right{display:flex;align-items:center;gap:8px}
.tick{font-size:11px;color:var(--faint)}
.btn-icon{width:32px;height:32px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr)}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
/* Quick Stats */
.qs-bar{border-bottom:1px solid var(--border);padding:14px 0}
.qs-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
@media(max-width:900px){.qs-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:540px){.qs-grid{grid-template-columns:repeat(2,1fr)}}
.qs-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px}
.qs-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-bottom:4px}
.qs-val{font-size:20px;font-weight:800;letter-spacing:-.03em;line-height:1}
.qs-val.c-in{color:var(--in)}.qs-val.c-out{color:var(--out)}.qs-val.c-open{color:var(--open)}
.qs-val.c-blue{color:var(--blue)}.qs-val.c-ok{color:var(--muted)}
.qs-delta{font-size:10px;color:var(--faint);margin-top:3px}
/* Tabs */
.tabs{border-bottom:1px solid var(--border);display:flex;gap:0;margin-top:2px}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;white-space:nowrap;transition:color var(--tr),border-color var(--tr)}
.tab:hover{color:var(--text)}
.tab.on{color:var(--text);border-bottom-color:var(--blue)}
.tab-n{margin-left:5px;font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;background:var(--surface2);color:var(--faint)}
.tab.on .tab-n{background:var(--blue-bg);color:var(--blue)}
/* Position Filter Bar */
.pos-filter-bar{position:sticky;top:52px;z-index:40;background:var(--bg);border-bottom:1px solid var(--border);padding:8px 0}
.pfb-inner{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pfb-chips{display:flex;gap:4px;flex-wrap:wrap}
.filter-chip{padding:4px 12px;border-radius:16px;border:1px solid transparent;background:none;font-size:12px;color:var(--muted);cursor:pointer;transition:all var(--tr);white-space:nowrap}
.filter-chip:hover{color:var(--text)}
.filter-chip.active{background:var(--surface);border-color:var(--border2);color:var(--text);font-weight:500}
.pfb-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.pfb-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:var(--r-sm);font-size:12px;cursor:pointer;outline:none}
.pfb-select:focus{border-color:var(--blue)}
.pfb-count{font-size:11px;color:var(--faint);white-space:nowrap}
/* Content */
.content{padding:20px 0 60px}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;white-space:nowrap}
.b-in{background:var(--in-bg);color:var(--in)}
.b-out{background:var(--out-bg);color:var(--out)}
.b-open{background:var(--open-bg);color:var(--open)}
.b-partial{background:var(--partial-bg);color:var(--partial)}
.b-settled{background:var(--settled-bg);color:var(--settled)}
.b-rev{background:var(--reversed-bg);color:var(--reversed)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-neutral{background:var(--surface2);color:var(--muted)}
.b-red{background:var(--out-bg);color:var(--out)}
.obj-type-badge{font-size:9px;letter-spacing:.03em;text-transform:uppercase}
/* Color helpers */
.c-in{color:var(--in)}.c-out{color:var(--out)}.c-open{color:var(--open)}
.c-blue{color:var(--blue)}.c-ok{color:var(--muted)}.mono{font-family:var(--mono)}
/* Position cards v2 */
.pos-grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px}
@media(max-width:420px){.pos-grid2{grid-template-columns:1fr}}
.pos-card2{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;border-left-width:3px;cursor:pointer;transition:border-color var(--tr),box-shadow var(--tr)}
.pos-card2:hover{box-shadow:0 0 0 1px var(--border2)}
.pc-open{border-left-color:var(--open)}
.pc-partial{border-left-color:var(--partial)}
.pc-settled{border-left-color:var(--in)}
.pc-reversed{border-left-color:var(--reversed)}
.pc-skeleton{border-left-color:var(--border);min-height:120px;animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.6}}
.pc-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.pc-header-l{display:flex;flex-direction:column;gap:4px;min-width:0}
.pc-header-r{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0}
.pc-id{font-family:var(--mono);font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-amounts{padding:11px 14px;display:flex;flex-direction:column;gap:7px}
.pc-amt-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pc-amt-label{font-size:11px;color:var(--muted)}
.pc-amt-val{font-family:var(--mono);font-size:13px;font-weight:700}
.pc-oversett{background:var(--out-bg);margin:0 -14px;padding:4px 14px;border-top:1px solid var(--border)}
.pc-footer{padding:9px 14px;background:var(--surface2);border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;font-size:10px;color:var(--faint)}
.pc-drill{margin-left:auto;color:var(--blue);font-weight:600;font-size:10px}
/* Pagination */
.pag{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:24px;padding-bottom:8px}
.pag-btn{padding:6px 14px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface);color:var(--muted);font-size:12px;cursor:pointer;transition:all var(--tr)}
.pag-btn:hover:not(:disabled){background:var(--surface2);color:var(--text)}
.pag-btn:disabled{opacity:.35;cursor:default}
.pag-info{font-size:11px;color:var(--faint)}
/* Detail Drawer */
.drawer-backdrop{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.5);backdrop-filter:blur(2px)}
.drawer{position:fixed;top:0;right:0;bottom:0;z-index:61;width:420px;max-width:100vw;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
@media(max-width:480px){.drawer{width:100vw}}
.drawer-hdr{padding:16px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0}
.drawer-id{font-family:var(--mono);font-size:13px;font-weight:600;word-break:break-all}
.drawer-close{width:28px;height:28px;border-radius:var(--r-sm);border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all var(--tr)}
.drawer-close:hover{background:var(--surface2);color:var(--text)}
.drawer-body{flex:1;overflow-y:auto;padding:16px}
.dt-section{margin-bottom:24px}
.dt-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin-bottom:10px}
.dt-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.dt-row:last-child{border-bottom:none}
.dt-label{font-size:12px;color:var(--muted)}
.dt-val{font-family:var(--mono);font-size:13px;font-weight:700}
/* Detail timeline */
.dt-timeline{display:flex;flex-direction:column;gap:0}
.dt-event{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.dt-event:last-child{border-bottom:none}
.dt-event.dt-settle{background:var(--settled-bg);margin:0 -16px;padding:10px 16px;border-bottom:1px solid var(--border)}
.dt-event.dt-rev{background:var(--reversed-bg);margin:0 -16px;padding:10px 16px;border-bottom:1px solid var(--border)}
.dt-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.dt-dot.in{background:var(--in)}.dt-dot.out{background:var(--out)}.dt-dot.neutral{background:var(--muted)}.dt-dot.rev{background:var(--reversed)}.dt-dot.settle{background:var(--settled)}
.dt-ev-body{flex:1;min-width:0}
.dt-ev-top{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap;margin-bottom:3px}
.dt-ev-type{font-size:12px;font-weight:600}
.dt-ev-date{font-size:10px;color:var(--faint)}
.dt-ev-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.dt-ev-amt{font-family:var(--mono);font-size:12px;font-weight:700}
.dt-ev-desc{font-size:10px;color:var(--muted);margin-top:4px;font-style:italic;line-height:1.4}
.dt-ev-parties{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
/* Feed */
.filter-bar{display:flex;align-items:center;gap:4px;padding:8px 0;overflow-x:auto}
.filter-btn{flex-shrink:0;padding:4px 12px;border-radius:16px;border:1px solid transparent;background:none;font-size:12px;color:var(--muted);cursor:pointer;transition:all var(--tr);white-space:nowrap}
.filter-btn:hover{color:var(--text)}
.filter-btn.active{background:var(--surface);border-color:var(--border2);color:var(--text);font-weight:500}
.feed-list{display:flex;flex-direction:column;gap:8px}
.feed-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;border-left-width:3px}
.ef-in{border-left-color:var(--in)}.ef-out{border-left-color:var(--out)}
.ef-settle{border-left-color:var(--settled)}.ef-rev{border-left-color:var(--reversed)}.ef-neutral{border-left-color:var(--faint)}
.fc-z1{padding:10px 14px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.fc-z1-l{display:flex;align-items:center;gap:7px;flex-wrap:wrap;min-width:0}
.fc-type{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.fc-ref{font-family:var(--mono);font-size:10px;color:var(--faint)}
.fc-date{font-size:10px;color:var(--faint);flex-shrink:0}
.fc-z2{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;justify-content:space-between;gap:8px;flex-wrap:wrap}
.fc-headline{font-size:12px;color:var(--muted);line-height:1.4;flex:1;min-width:0}
.fc-amount{font-size:22px;font-weight:800;letter-spacing:-.04em;flex-shrink:0}
.fc-amount.ef-in{color:var(--in)}.fc-amount.ef-out{color:var(--out)}
.fc-amount.ef-settle{color:var(--settled)}.fc-amount.ef-rev{color:var(--reversed)}.fc-amount.ef-neutral{color:var(--muted)}
.fc-z3{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:38px}
.party-pill{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;white-space:nowrap}
.party-pill.in{background:var(--in-bg);color:var(--in)}.party-pill.out{background:var(--out-bg);color:var(--out)}.party-pill.neutral{background:var(--surface2);color:var(--muted)}
.fc-z4{padding:8px 14px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.fc-z4-l{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0}
.fc-obj{font-family:var(--mono);font-size:10px;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.fc-pos-link{font-size:10px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:2px;flex-shrink:0;white-space:nowrap}
/* Cashflow */
.cf-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px}
tr:last-child td{border-bottom:none}
tr.cf-row{cursor:pointer}
tr.cf-row:hover td{background:var(--surface2)}
.cf-resultado.pos{color:var(--in);font-weight:700}.cf-resultado.neg{color:var(--out);font-weight:700}
.cf-expand td{padding:8px 14px 8px 32px;background:var(--surface2)}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.chart-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-bottom:14px}
.chart-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.chart-label{font-size:10px;color:var(--muted);width:80px;flex-shrink:0;text-align:right;font-family:var(--mono)}
.chart-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.chart-bar-row{display:flex;align-items:center;gap:4px}
.bar{height:10px;border-radius:2px;transition:width .3s ease;min-width:2px}
.bar-in{background:var(--in)}.bar-out{background:var(--out)}
.chart-val{font-size:9px;color:var(--faint);font-family:var(--mono);white-space:nowrap}
/* Staging */
.stg-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.rej-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:10px}
@media(max-width:440px){.rej-grid{grid-template-columns:1fr}}
.rej-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--out);border-radius:var(--r);overflow:hidden}
.rej-hdr{padding:11px 13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.rej-body{padding:11px 13px;display:flex;flex-direction:column;gap:8px}
.reason-row{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border)}
.reason-row:last-child{border-bottom:none}
.reason-desc{font-size:11px;color:var(--muted);line-height:1.4;flex:1}
.expand-btn{background:none;border:none;cursor:pointer;font-size:10px;color:var(--faint);display:flex;align-items:center;gap:3px;transition:color var(--tr)}
.expand-btn:hover{color:var(--muted)}
.raw{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px;font-family:var(--mono);font-size:10px;color:var(--muted);overflow-x:auto;white-space:pre;max-height:160px;overflow-y:auto;margin-top:4px}
.rej-rate{padding:10px 14px;background:var(--out-bg);border:1px solid var(--out);border-radius:var(--r);font-size:12px;color:var(--out);margin-bottom:12px}
/* Shared */
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--faint)}
.sec-line{height:1px;background:var(--border);flex:1}
.sec-count{font-size:10px;color:var(--faint)}
.empty{text-align:center;padding:40px 20px;color:var(--faint);display:flex;flex-direction:column;align-items:center;gap:6px}
.empty-ico{font-size:24px;opacity:.5;margin-bottom:2px}
.empty-title{font-size:13px;font-weight:500;color:var(--muted)}
.empty-sub{font-size:11px;max-width:260px;line-height:1.5}
.load-more{width:100%;padding:10px;border:1px dashed var(--border2);border-radius:var(--r);background:none;color:var(--faint);cursor:pointer;font-size:12px;transition:all var(--tr);margin-top:4px}
.load-more:hover{background:var(--surface);color:var(--muted);border-color:var(--border)}
.toast{position:fixed;top:64px;right:20px;z-index:200;background:var(--blue);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:12px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.4);animation:toastIn .2s ease both;pointer-events:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── API ──────────────────────────────────────────────────────────────────────

const api = {
  positions: (params = {}) => {
    const q = new URLSearchParams();
    if (params.page)       q.set('page',       String(params.page));
    if (params.limit)      q.set('limit',      String(params.limit));
    if (params.status)     q.set('status',     params.status);
    if (params.outcome)    q.set('outcome',    params.outcome);
    if (params.objectType) q.set('objectType', params.objectType);
    return fetch(`/api/positions?${q}`).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
  },
  positionDetail: (id) =>
    fetch(`/api/positions/${encodeURIComponent(id)}`).then(r => r.ok ? r.json() : null),
  feed: (params = {}) => {
    const q = new URLSearchParams();
    if (params.page)  q.set('page',  String(params.page));
    if (params.limit) q.set('limit', String(params.limit));
    return fetch(`/api/events/feed?${q}`).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
  },
  staging:  (p = {}) => fetch(`/api/staging?limit=${p.limit||100}`).then(r => r.json()),
  rejected: (p = {}) => fetch(`/api/events/rejected?limit=${p.limit||100}`).then(r => r.json()),
};

// ─── Formatters ───────────────────────────────────────────────────────────────

const fmtBRL = n =>
  new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(parseFloat(n) || 0);

const fmtDate = (raw, withTime = false) => {
  if (!raw) return '—';
  try {
    return new Intl.DateTimeFormat('pt-BR', {
      day: '2-digit', month: '2-digit', year: '2-digit',
      ...(withTime ? { hour: '2-digit', minute: '2-digit' } : {}),
    }).format(new Date(raw));
  } catch { return String(raw); }
};

const trunc = (s, n = 28) => s && s.length > n ? s.slice(0, n) + '…' : (s || '—');

// ─── Feed Tab ─────────────────────────────────────────────────────────────────

const FEED_FILTERS = [
  { key: 'all',      label: 'Todos'          },
  { key: 'cash_in',  label: 'Recebíveis'     },
  { key: 'cash_out', label: 'Pagáveis'       },
  { key: 'non_cash', label: 'Non-Cash'       },
  { key: 'settles',  label: 'Liquidações'    },
  { key: 'reverses', label: 'Estornos'       },
];

function applyFeedFilter(events, filter) {
  if (filter === 'all')     return events;
  if (filter === 'settles') return events.filter(e => e.objects?.[0]?.relation === 'settles');
  if (filter === 'reverses')return events.filter(e => e.objects?.[0]?.relation === 'reverses');
  return events.filter(e => e.economicEffect === filter);
}

function effectClass(ev) {
  const rel = ev.objects?.[0]?.relation;
  if (rel === 'reverses') return 'ef-rev';
  if (rel === 'settles')  return 'ef-settle';
  if (ev.economicEffect === 'cash_in')  return 'ef-in';
  if (ev.economicEffect === 'cash_out') return 'ef-out';
  return 'ef-neutral';
}

function feedAmtPrefix(ev) {
  const rel = ev.objects?.[0]?.relation;
  if (rel === 'reverses') return '↩ ';
  if (rel === 'settles')  return '✓ ';
  if (ev.economicEffect === 'cash_in')  return '↑ ';
  if (ev.economicEffect === 'cash_out') return '↓ ';
  return '~ ';
}

function EventCard({ ev, onViewPosition }) {
  const cls    = effectClass(ev);
  const prefix = feedAmtPrefix(ev);

  return (
    <div className={`feed-card ${cls} fade`}>

          <span className="fc-ref">{ev.source?.reference}</span>

            <span className="badge b-open" style={{fontSize:9}}>Manual</span>
          )}
        </div>
        <span className="fc-date">{fmtDate(ev.occurredAt, true)}</span>
      </div>

      <div className="fc-z2">
        <div className="fc-headline">
          {ev.reason?.description || ev.eventType?.replace(/_/g, ' ')}
          {ev.reason?.confidence === 'medium' && (
            <span className="badge b-open" style={{fontSize:9,marginLeft:6,verticalAlign:'middle'}}>Confiança média</span>
          )}
        </div>
        <span className={`fc-amount ${cls}`}>{prefix}{fmtBRL(ev.amount)}</span>
      </div>

      <div className="fc-z3">
        {ev.parties?.length > 0
          ? ev.parties.map((p, i) => (
              <span key={i} className={`party-pill ${p.direction==='in'?'in':p.direction==='out'?'out':'neutral'}`}>
                {p.direction==='in'?'↑':p.direction==='out'?'↓':'~'}&nbsp;
                {p.partyId?.replace(/^party-/, '')}

            ))
          : <span style={{fontSize:10,color:'var(--faint)'}}>Sem partes</span>

      </div>

      <div className="fc-z4">
        <div className="fc-z4-l">
          <span className="fc-obj">{ev.objects?.[0]?.objectId}</span>

// ─── Cashflow Tab ─────────────────────────────────────────────────────────────

function groupCashflow(events) {
  const fmt = d => new Date(d).toLocaleDateString('pt-BR', { month: 'short', year: 'numeric' });
  const map = new Map();
  for (const ev of events) {
    const k = fmt(ev.occurredAt);
    if (!map.has(k)) map.set(k, { period: k, events: [], totalIn: 0, totalOut: 0 });
    const g = map.get(k);
    g.events.push(ev);
    if (ev.economicEffect === 'cash_in')  g.totalIn  += parseFloat(ev.amount || 0);
    if (ev.economicEffect === 'cash_out') g.totalOut += parseFloat(ev.amount || 0);
  }
  return Array.from(map.values());
}

function CashflowRow({ row, expanded, onToggle }) {
  const net = row.totalIn - row.totalOut;
  return (
    <>
      <tr className="cf-row" onClick={onToggle}>
        <td><span className="mono" style={{fontSize:11}}>{row.period}</span></td>
        <td><span style={{color:'var(--in)',fontWeight:700}}>{fmtBRL(row.totalIn)}</span></td>
        <td><span style={{color:'var(--out)',fontWeight:700}}>{fmtBRL(row.totalOut)}</span></td>
        <td><span className={`cf-resultado ${net >= 0 ? 'pos' : 'neg'}`}>{net >= 0 ? '▲' : '▼'} {fmtBRL(Math.abs(net))}</span></td>
        <td><span className="badge b-neutral" style={{fontSize:9}}>{row.events.length}</span></td>
        <td style={{fontSize:11,color:'var(--faint)'}}>{expanded ? '▲' : '▼'}</td>
      </tr>
      {expanded && row.events.map(ev => (
        <tr key={ev.id} className="cf-expand">
          <td colSpan={6}>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <span className={`badge ${ev.economicEffect==='cash_in'?'b-in':ev.economicEffect==='cash_out'?'b-out':'b-neutral'}`}>
                {getEventLabel(ev)}
              </span>
              <span className="mono" style={{fontSize:10,color:'var(--muted)'}}>{trunc(ev.source?.reference, 18)}</span>
              <span style={{fontSize:11,color:'var(--muted)'}}>{fmtDate(ev.occurredAt, true)}</span>
              <span style={{marginLeft:'auto',fontWeight:700,fontFamily:'var(--mono)',fontSize:11,
                color:ev.economicEffect==='cash_in'?'var(--in)':ev.economicEffect==='cash_out'?'var(--out)':'var(--muted)'}}>
                {ev.economicEffect==='cash_in'?'↑':ev.economicEffect==='cash_out'?'↓':'~'} {fmtBRL(ev.amount)}
              </span>
            </div>
          </td>
        </tr>
      ))}
    </>
  );
}

function CashflowChart({ rows }) {
  const maxVal = Math.max(...rows.map(r => Math.max(r.totalIn, r.totalOut)), 1);
  const maxW   = 240;
  return (
    <div className="chart-wrap">
      <div className="chart-title">Fluxo de Caixa por Período</div>
      {rows.map((r, i) => (
        <div key={i} className="chart-row">
          <div className="chart-label">{r.period}</div>
          <div className="chart-bars">
            <div className="chart-bar-row">
              <div className="bar bar-in" style={{width:`${(r.totalIn / maxVal) * maxW}px`}} />
              <span className="chart-val">{fmtBRL(r.totalIn)}</span>
            </div>
            <div className="chart-bar-row">
              <div className="bar bar-out" style={{width:`${(r.totalOut / maxVal) * maxW}px`}} />
              <span className="chart-val">{fmtBRL(r.totalOut)}</span>
            </div>
          </div>
        </div>
      ))}
      <div style={{display:'flex',gap:16,marginTop:12}}>
        <span style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'var(--muted)'}}>
          <span style={{width:10,height:10,borderRadius:2,background:'var(--in)',display:'inline-block'}} /> Entradas
        </span>
        <span style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'var(--muted)'}}>
          <span style={{width:10,height:10,borderRadius:2,background:'var(--out)',display:'inline-block'}} /> Saídas
        </span>
      </div>
    </div>
  );
}

function CashflowTab({ feedData }) {
  const [expanded, setExpanded] = useState(null);
  const events = feedData?.data || [];
  const rows   = groupCashflow(events);

  if (!rows.length) {
    return (
      <div className="empty" style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)'}}>
        <div className="empty-ico">○</div>
        <div className="empty-title">Nenhum evento de caixa registrado</div>
      </div>
    );
  }

  return (
    <div>
      <div className="cf-table" style={{marginBottom:20}}>
        <table>
          <thead>
            <tr><th>Período</th><th>Entradas</th><th>Saídas</th><th>Resultado</th><th>Eventos</th><th></th></tr>
          </thead>
          <tbody>
            {rows.map((r, i) => (
              <CashflowRow key={i} row={r} expanded={expanded === i} onToggle={() => setExpanded(expanded === i ? null : i)} />
            ))}
          </tbody>
        </table>
      </div>
      <CashflowChart rows={rows} />
    </div>
  );
}

// ─── Staging Tab ──────────────────────────────────────────────────────────────

function StagingTable({ records }) {
  if (!records.length) {
    return (
      <div className="stg-wrap">
        <div className="empty">
          <div className="empty-ico">◎</div>
          <div className="empty-title">Nenhum candidato</div>
        </div>
      </div>
    );
  }
  return (
    <div className="stg-wrap">
      <table>
        <thead><tr><th>ID</th><th>Sistema</th><th>Referência</th><th>Valor</th><th>Data</th><th>Status</th></tr></thead>
        <tbody>
          {records.map(r => (
            <tr key={r.id}>
              <td><span className="mono" style={{fontSize:10,color:'var(--muted)'}}>{trunc(r.id, 12)}</span></td>
              <td><span className="badge b-neutral">{r.sourceSystem || '—'}</span></td>
              <td><span className="mono" style={{fontSize:11}}>{r.sourceReference || '—'}</span></td>
              <td><span className="mono" style={{fontWeight:600}}>{r.amount ? fmtBRL(r.amount) : '—'}</span></td>
              <td style={{fontSize:11,color:'var(--muted)'}}>{fmtDate(r.occurredAt)}</td>
              <td>
                {r.status === 'pending'
                  ? <span className="badge b-open">Pendente</span>
                  : <span className="badge b-settled">Processado</span>}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function RejectedCard({ ev }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="rej-card fade">
      <div className="rej-hdr">
        <div>
          <div style={{fontSize:10,color:'var(--faint)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:3}}>Staging ID</div>
          <div className="mono" style={{fontSize:12,color:'var(--muted)'}}>{ev.stagingId}</div>
          <div style={{fontSize:10,color:'var(--faint)',marginTop:3}}>{fmtDate(ev.rejectedAt, true)}</div>
        </div>
        <span className="badge b-red">{ev.reasons.length} motivo{ev.reasons.length !== 1 ? 's' : ''}</span>
      </div>
      <div className="rej-body">
        {ev.reasons.map((r, i) => (
          <div key={i} className="reason-row">
            <span className="badge b-red" style={{flexShrink:0}}>{getRejectionLabel(r.type)}</span>
            <span className="reason-desc">{r.description}</span>
          </div>
        ))}
        {ev.rawPayload != null && (
          <div>
            <button className="expand-btn" onClick={() => setOpen(v => !v)}>
              {open ? '▲' : '▶'}&nbsp;Payload {open ? '(ocultar)' : '(expandir)'}
            </button>
            {open && <pre className="raw">{JSON.stringify(ev.rawPayload, null, 2)}</pre>}
          </div>
        )}
      </div>
    </div>
  );
}

function StagingTab({ stagingData, rejectedData }) {
  const staging  = stagingData?.data  || [];
  const rejected = rejectedData?.data || [];
  const totS     = stagingData?.total  ?? staging.length;
  const totR     = rejectedData?.total ?? rejected.length;
  const rate     = totS + totR > 0 ? Math.round(totR / (totS + totR) * 100) : 0;

  return (
    <div>
      <div className="sec-hdr">
        <span className="sec-title">Candidatos a Eventos</span>
        <div className="sec-line" />
        <span className="sec-count">{totS}</span>
      </div>
      <StagingTable records={staging} />

      <div className="sec-hdr" style={{marginTop:28}}>
        <span className="sec-title" style={{color:'var(--out)'}}>Rejeitados</span>
        <div className="sec-line" />
        <span className="sec-count">{totR}</span>
      </div>
      {rejected.length > 0 && (
        <div className="rej-rate">
          {rate}% dos candidatos foram rejeitados — {totR} evento{totR !== 1 ? 's' : ''} com problema
        </div>
      )}
      {rejected.length === 0
        ? <div className="empty" style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)'}}><div className="empty-ico">✓</div><div className="empty-title">Nenhum evento rejeitado</div></div>
        : <div className="rej-grid">{rejected.map(e => <RejectedCard key={e.id} ev={e} />)}</div>
      }
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [theme, setTheme] = useState(() =>
    window.matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark'
  );
  const [tab, setTab] = useState('positions');

  // Positions board
  const [positions,  setPositions]  = useState({ data: [], total: 0, page: 1, limit: 20, totalPages: 1 });
  const [posFilters, setPosFilters] = useState({ status: '', outcome: '', objectType: '', page: 1 });
  const [posLoading, setPosLoading] = useState(true);

  // Detail drawer: { objectId, listItem }
  const [drawer, setDrawer] = useState(null);

  // Feed
  const [feedData,   setFeedData]   = useState(null);
  const [feedLimit,  setFeedLimit]  = useState(50);

  // Staging / rejected
  const [stagingData,  setStagingData]  = useState(null);
  const [rejectedData, setRejectedData] = useState(null);

  const [lastTick, setLastTick] = useState(null);
  const [toast,    setToast]    = useState(null);
  const toastTimer   = useRef(null);
  const refreshTimer = useRef(null);

  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  // Load positions when filters change
  const loadPositions = useCallback(async (filters) => {
    setPosLoading(true);
    try {
      const data = await api.positions({ ...filters, limit: 20 });
      setPositions(data);
    } catch (e) {
      console.error('positions fetch error:', e);
    } finally {
      setPosLoading(false);
    }
  }, []);

  useEffect(() => { loadPositions(posFilters); }, [posFilters, loadPositions]);

  // Load feed when feed/cashflow tab is active or limit increases
  useEffect(() => {
    if (tab !== 'feed' && tab !== 'cashflow') return;
    api.feed({ limit: feedLimit })
      .then(d => setFeedData(d))
      .catch(console.error);
  }, [tab, feedLimit]);

  // Load staging when staging tab is active
  useEffect(() => {
    if (tab !== 'staging') return;
    Promise.all([api.staging(), api.rejected()])
      .then(([s, r]) => { setStagingData(s); setRejectedData(r); })
      .catch(console.error);
  }, [tab]);

  // Auto-refresh positions every 15s
  useEffect(() => {
    setLastTick(new Date());
    refreshTimer.current = setInterval(() => {
      loadPositions(posFilters);
      setLastTick(new Date());
    }, 15000);
    return () => clearInterval(refreshTimer.current);
  }, [posFilters, loadPositions]);

  const showToast = (msg) => {
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 3000);
  };

  const handleRefresh = () => {
    loadPositions(posFilters);
    setLastTick(new Date());
    showToast('Dados atualizados');
  };

  // Open detail from positions list
  const handleSelectPosition = (objectId) => {
    const listItem = positions.data.find(p => p.objectId === objectId) || null;
    setDrawer({ objectId, listItem });
  };

  // Open detail from feed tab (navigates to positions tab too)
  const handleViewPositionFromFeed = (objectId) => {
    setDrawer({ objectId, listItem: null });
    setTab('positions');
  };

  return (
    <div>
      {toast && <div className="toast">● {toast}</div>}

      {drawer && (
        <DetailDrawer
          objectId={drawer.objectId}
          listItem={drawer.listItem}
          onClose={() => setDrawer(null)}
        />
      )}

      <header className="hdr">
        <div className="wrap">
          <div className="hdr-inner">
            <div className="brand"><div className="brand-dot" />Ledger · Posições</div>
            <div className="hdr-right">
              {lastTick && <span className="tick">Atualizado {lastTick.toLocaleTimeString('pt-BR')}</span>}
              <button className="btn-icon" onClick={handleRefresh} title="Atualizar">↺</button>
              <button className="btn-icon" onClick={() => setTheme(t => t==='dark'?'light':'dark')} title="Tema">
                {theme === 'dark' ? '☀' : '◑'}
              </button>
            </div>
          </div>
        </div>
      </header>

      <QuickStats positions={positions} rejectedTotal={rejectedData?.total ?? 0} />

      <div className="wrap">
        <div className="tabs">
          <button className={`tab ${tab==='positions'?'on':''}`} onClick={() => setTab('positions')}>
            Posições<span className="tab-n">{positions.total}</span>
          </button>
          <button className={`tab ${tab==='feed'?'on':''}`} onClick={() => setTab('feed')}>
            Feed de Eventos<span className="tab-n">{feedData?.total ?? '…'}</span>
          </button>
          <button className={`tab ${tab==='cashflow'?'on':''}`} onClick={() => setTab('cashflow')}>
            Fluxo por Período
          </button>
          <button className={`tab ${tab==='staging'?'on':''}`} onClick={() => setTab('staging')}>
            Candidatos &amp; Rejeições
            <span className="tab-n">{(stagingData?.total ?? 0) + (rejectedData?.total ?? 0) || '…'}</span>
          </button>
        </div>
      </div>

      {tab === 'positions' && (
        <PositionFilterBar
          filters={posFilters}
          onFilter={setPosFilters}
          total={positions.total}
          loading={posLoading}
        />
      )}

      <div className="wrap">
        <div className="content">
          {tab === 'positions' && (
            <PositionsTab
              positions={positions}
              filters={posFilters}
              onFilter={setPosFilters}
              loading={posLoading}
              onSelect={handleSelectPosition}
            />
          )}
          {tab === 'feed' && (
            <FeedTab
              feedData={feedData}
              loading={!feedData}
              onLoadMore={() => setFeedLimit(l => l + 50)}
              onViewPosition={handleViewPositionFromFeed}
            />
          )}
          {tab === 'cashflow' && <CashflowTab feedData={feedData} />}
          {tab === 'staging'  && <StagingTab  stagingData={stagingData} rejectedData={rejectedData} />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
